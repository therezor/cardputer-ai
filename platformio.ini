; Cardputer AI — ESP-IDF build via PlatformIO.
;
; The project is a standard ESP-IDF layout (main/ component + top-level
; CMakeLists.txt), so it also builds with plain `idf.py build`. PlatformIO
; just orchestrates the same CMake build: `pio run -t upload`.
;
; Platform: pioarduino (community-maintained espressif32 fork) — the official
; espressif32 platform stopped at IDF 5.4; this release ships IDF v5.5.4.

[platformio]
src_dir = main

; One env for both the original Cardputer and the Cardputer ADV: they share the
; M5Stamp-S3 module (ESP32-S3FN8, 8 MB flash, no PSRAM) and produce the same
; image. The keyboard controller differs (original: IO matrix; ADV: TCA8418)
; but is selected at runtime from M5.getBoard(), and M5Unified autodetects the
; display — so one firmware.bin runs on either board.
[env:cardputer]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = espidf
; Flash settings must match sdkconfig.defaults (DIO / 80 MHz).
board = m5stack-stamps3
board_build.flash_mode = dio
board_build.partitions = partitions.csv
monitor_speed = 115200
